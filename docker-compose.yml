services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: server:0.0.1
    container_name: server
    ports:
      - "8080:8080"
    networks:
      - webnet

  prometheus:
    image: prom/prometheus:v2.40.7
    container_name: prometheus
    depends_on:
      - server
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - webnet

  grafana:
    image: grafana/grafana:9.4.2
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/config.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/default.yaml:ro
      - ./grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/default.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
